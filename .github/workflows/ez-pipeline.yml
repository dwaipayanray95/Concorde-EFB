name: 'EZ All-in-One Pipeline'

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

# ---------------------------------------------------------
# ⚙️ EASY CONFIGURATION
# Set the platforms you want to build to 'true' or 'false'
# ---------------------------------------------------------
env:
  BUILD_ANDROID_APK: 'false'
  BUILD_ANDROID_AAB: 'false'
  BUILD_WEB: 'false'
  BUILD_MACOS: 'false'
  BUILD_WINDOWS: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-check:
    name: PR Verification
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Pilot Size Labeler
        uses: ./actions/pr-pilot

      - name: Run Security Scan
        uses: ./actions/security-scan

      - name: Scan Licenses
        uses: ./actions/license-guard
        with:
          fail-on-violation: 'false'

  release-management:
    name: Release Notes & Changelog
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security Scan Verification
        uses: ./actions/security-scan

      - name: Verify Package Licenses
        uses: ./actions/license-guard
        with:
          fail-on-violation: 'true'

      - name: Generate AI Release Notes
        uses: ./actions/ai-release-notes
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          publish: 'true'

      - name: Update Changelog
        uses: ./actions/auto-changelog
        with:
          commit-changes: 'true'

  build-ubuntu:
    name: Build Android & Web
    if: startsWith(github.ref, 'refs/tags/v') && (env.BUILD_ANDROID_APK == 'true' || env.BUILD_ANDROID_AAB == 'true' || env.BUILD_WEB == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App (APK)
        if: env.BUILD_ANDROID_APK == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'android-apk'
          split-apk: 'true'
          # keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          # keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          # key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          # key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android App (AAB)
        if: env.BUILD_ANDROID_AAB == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'android-aab'

      - name: Build Web App
        if: env.BUILD_WEB == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'web'

  build-macos:
    name: Build macOS
    if: startsWith(github.ref, 'refs/tags/v') && env.BUILD_MACOS == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build macOS App
        uses: ./actions/flutter-build
        with:
          platform: 'macos'

  build-windows:
    name: Build Windows
    if: startsWith(github.ref, 'refs/tags/v') && env.BUILD_WINDOWS == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Windows App
        uses: ./actions/flutter-build
        with:
          platform: 'windows'
