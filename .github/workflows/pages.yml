name: Deploy website (changelog + donate) to GitHub Pages

# This workflow only ever touches the /changelog and /donate subfolders of
# the gh-pages branch. Everything else already published there (the site
# root, /beta, etc.) is left untouched via `keep_files: true` — gh-pages is
# the standalone source of truth for the deployed site; this app repo just
# supplies the changelog content and its git history.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from git history
        run: python3 scripts/generate_changelog.py

      - name: Deploy changelog page
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public/changelog
          destination_dir: changelog
          keep_files: true

      - name: Deploy donate page
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public/donate
          destination_dir: donate
          keep_files: true
